<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VV Studio Network</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            background-color: #0b0e14;
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* Full Screen Map Area */
        #map-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            display: flex;
            align-items: center;
            justify-content: center;

            /* THIS applies permanent baseline padding so it never touches the edges */
            padding: 40px;
            box-sizing: border-box;
            transition: padding-right 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        #map-area.shifted {
            /* Adds the width of the panel (420) + the baseline right padding (40) */
            padding-right: 460px;
        }

        .svg-container {
            width: 100%;
            height: 100%;
            max-width: 1400px;
            transition: all 0.3s ease;
        }

        /* Node Styling */
        .node-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease, border-color 0.2s ease;
            box-sizing: border-box;
            padding: 10px;
        }

        .node-box:hover {
            transform: translateY(-4px);
            border-color: #8b949e;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .node-icon {
            margin-bottom: 6px;
            color: #c9d1d9;
            width: 24px;
            height: 24px;
        }

        .mac-color {
            border-top: 4px solid #a855f7;
        }

        .win-color {
            border-top: 4px solid #3b82f6;
        }

        .hub-color {
            border: 2px dashed #8b949e;
            background: #0d1117;
            cursor: default;
        }

        .hub-color:hover {
            transform: none;
            box-shadow: none;
            border-color: #8b949e;
        }

        .node-box h3 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 1px;
            text-align: center;
        }

        .node-box p {
            margin: 4px 0 0;
            font-size: 10px;
            color: #8b949e;
            text-transform: uppercase;
            text-align: center;
        }

        /* Path Styling */
        path {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .wifi-line {
            stroke: #8b949e;
            stroke-width: 2;
            stroke-dasharray: 6, 6;
        }

        .tb-line {
            stroke: #a855f7;
            stroke-width: 3;
        }

        .eth-line {
            stroke: #3b82f6;
            stroke-width: 3;
        }

        .usb-line {
            stroke: #8b949e;
            stroke-width: 2;
        }

        @keyframes pulse-dash {
            to {
                stroke-dashoffset: -20;
            }
        }

        .tailscale-line {
            stroke: #14b8a6;
            stroke-width: 3;
            stroke-dasharray: 6, 4;
            animation: pulse-dash 1s linear infinite;
        }

        /* Label Pills */
        .label-pill {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            color: #c9d1d9;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            width: fit-content;
            margin: 0 auto;
            white-space: nowrap;
        }

        .label-pill.ts {
            border-color: #14b8a6;
            color: #14b8a6;
        }

        .label-pill.tb {
            border-color: #a855f7;
            color: #a855f7;
        }

        .label-pill.eth {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .drive-box {
            background: #1c2128;
            border: 1px solid #444c56;
            border-radius: 6px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-sizing: border-box;
            padding: 0 10px;
        }

        .drive-box i {
            color: #8b949e;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .drive-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .drive-box p {
            margin: 0;
            font-size: 11px;
            color: #c9d1d9;
            font-weight: 600;
            white-space: nowrap;
        }

        .drive-box span {
            font-size: 10px;
            color: #8b949e;
        }

        /* Solid Right-Side Panel */
        #panel {
            position: absolute;
            top: 0;
            right: -420px;
            width: 420px;
            height: 100vh;
            background: #0d1117;
            border-left: 1px solid #30363d;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.6);
            padding: 30px 20px 30px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: right 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        #panel.active {
            right: 0;
        }

        /* Scrollbar styling for the panel */
        #panel::-webkit-scrollbar {
            width: 8px;
        }

        #panel::-webkit-scrollbar-track {
            background: #0d1117;
        }

        #panel::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        #panel::-webkit-scrollbar-thumb:hover {
            background: #444c56;
        }

        /* Close Button */
        #close-btn {
            position: absolute;
            top: 25px;
            right: 15px;
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            z-index: 20;
        }

        #close-btn:hover {
            background: #21262d;
            color: #e6edf3;
        }

        .dock-header {
            margin-bottom: 30px;
            padding-right: 30px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
        }

        .dock-header h2 {
            margin: 0;
            color: #e6edf3;
            font-size: 22px;
            font-weight: 700;
        }

        .dock-header p {
            margin: 6px 0 0;
            color: #8b949e;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h4 {
            color: #4ade80;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .storage-grid {
            display: grid;
            gap: 10px;
        }

        .storage-item {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 6px;
        }

        .storage-item-title {
            font-size: 14px;
            font-weight: 600;
            color: #e6edf3;
        }

        .storage-tier {
            font-size: 11px;
            color: #8b949e;
            margin-top: 4px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .storage-sub {
            font-size: 12px;
            color: #c9d1d9;
            margin-top: 4px;
        }

        .list-item {
            font-size: 14px;
            margin-bottom: 8px;
            color: #c9d1d9;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-category-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            margin: 20px 0 10px 0;
            letter-spacing: 1px;
            border-left: 2px solid #4ade80;
            padding-left: 8px;
        }

        .app-category-label:first-child {
            margin-top: 0;
        }

        .software-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sw-tag {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #e6edf3;
        }
    </style>
</head>

<body>
    <div id="map-area">
        <svg class="svg-container" viewBox="0 40 1000 640" preserveAspectRatio="xMidYMid meet">

            <g>
                <path d="M 400 130 L 160 130 L 160 420" class="tailscale-line" rx="10" ry="10" />
                <path d="M 500 170 L 500 240" class="wifi-line" />
                <path d="M 500 320 L 160 420" class="wifi-line" />
                <path d="M 500 320 L 500 420" class="wifi-line" />
                <path d="M 500 320 L 840 420" class="wifi-line" />

                <path d="M 270 460 L 390 460" class="tb-line" stroke-dasharray="8,6" />
                <path d="M 610 460 L 730 460" class="eth-line" />

                <path d="M 160 500 L 80 580" class="tb-line" />
                <path d="M 160 500 L 220 580" class="tb-line" />
                <path d="M 160 500 L 360 580" class="usb-line" />
                <path d="M 500 500 L 500 580" class="usb-line" />
            </g>

            <foreignObject x="70" y="240" width="120" height="40">
                <div xmlns="http://www.w3.org/1999/xhtml" class="label-pill ts">
                    <i data-lucide="shield" style="width:14px; height:14px; margin-right:6px;"></i> Tailscale VPN
                </div>
            </foreignObject>

            <foreignObject x="270" y="440" width="120" height="40">
                <div xmlns="http://www.w3.org/1999/xhtml" class="label-pill tb">
                    <i data-lucide="zap" style="width:14px; height:14px; margin-right:6px;"></i> TB4 Bridge
                </div>
            </foreignObject>

            <foreignObject x="610" y="440" width="120" height="40">
                <div xmlns="http://www.w3.org/1999/xhtml" class="label-pill eth">
                    <i data-lucide="network" style="width:14px; height:14px; margin-right:6px;"></i> 1Gb ETH
                </div>
            </foreignObject>

            <text x="100" y="550" fill="#a855f7" font-size="11" font-weight="bold">TB 4</text>
            <text x="210" y="550" fill="#a855f7" font-size="11" font-weight="bold">TB 4</text>
            <text x="320" y="550" fill="#8b949e" font-size="11" font-weight="bold">USB 3</text>
            <text x="510" y="550" fill="#8b949e" font-size="11" font-weight="bold">USB 3</text>

            <foreignObject x="380" y="80" width="240" height="90">
                <div xmlns="http://www.w3.org/1999/xhtml" class="node-box mac-color" onclick="inspect('macLaptop')">
                    <i data-lucide="laptop" class="node-icon"></i>
                    <h3>MAC-LAPTOP</h3>
                    <p>Management Console</p>
                </div>
            </foreignObject>

            <foreignObject x="340" y="240" width="320" height="80">
                <div xmlns="http://www.w3.org/1999/xhtml" class="node-box hub-color">
                    <i data-lucide="router" class="node-icon"></i>
                    <h3>5GHz Wi-Fi LAN</h3>
                    <p>Local Boundary</p>
                </div>
            </foreignObject>

            <foreignObject x="40" y="410" width="240" height="90">
                <div xmlns="http://www.w3.org/1999/xhtml" class="node-box mac-color" onclick="inspect('macMini')">
                    <i data-lucide="cpu" class="node-icon"></i>
                    <h3>MAC-MINI</h3>
                    <p>Infrastructure Hub</p>
                </div>
            </foreignObject>

            <foreignObject x="380" y="410" width="240" height="90">
                <div xmlns="http://www.w3.org/1999/xhtml" class="node-box win-color"
                    onclick="inspect('winWorkstation')">
                    <i data-lucide="pc-case" class="node-icon"></i>
                    <h3>WIN-WORKSTATION</h3>
                    <p>Production Core</p>
                </div>
            </foreignObject>

            <foreignObject x="720" y="410" width="240" height="90">
                <div xmlns="http://www.w3.org/1999/xhtml" class="node-box win-color" onclick="inspect('winLaptop')">
                    <i data-lucide="laptop-2" class="node-icon"></i>
                    <h3>WIN-LAPTOP</h3>
                    <p>Mobile Production</p>
                </div>
            </foreignObject>

            <foreignObject x="20" y="580" width="130" height="55">
                <div xmlns="http://www.w3.org/1999/xhtml" class="drive-box">
                    <i data-lucide="hard-drive"></i>
                    <div class="drive-info">
                        <p>1TB NVMe</p><span>(M.2)</span>
                    </div>
                </div>
            </foreignObject>

            <foreignObject x="160" y="580" width="130" height="55">
                <div xmlns="http://www.w3.org/1999/xhtml" class="drive-box">
                    <i data-lucide="hard-drive"></i>
                    <div class="drive-info">
                        <p>2TB NVMe</p><span>(M.2)</span>
                    </div>
                </div>
            </foreignObject>

            <foreignObject x="300" y="580" width="130" height="55">
                <div xmlns="http://www.w3.org/1999/xhtml" class="drive-box">
                    <i data-lucide="server"></i>
                    <div class="drive-info">
                        <p>32TB Array</p><span>(8-Bay)</span>
                    </div>
                </div>
            </foreignObject>

            <foreignObject x="440" y="580" width="130" height="55">
                <div xmlns="http://www.w3.org/1999/xhtml" class="drive-box">
                    <i data-lucide="server"></i>
                    <div class="drive-info">
                        <p>8TB Array</p><span>(4-Bay)</span>
                    </div>
                </div>
            </foreignObject>
        </svg>
    </div>

    <div id="panel">
        <button id="close-btn" onclick="closePanel()" title="Close Panel">
            <i data-lucide="x" style="width:24px; height:24px;"></i>
        </button>

        <div class="dock-header">
            <h2 id="d-name">Device Name</h2>
            <p id="d-role">Role Description</p>
        </div>

        <div class="section">
            <h4><i data-lucide="database"></i> Storage Hierarchy</h4>
            <div id="d-storage" class="storage-grid"></div>
        </div>

        <div class="section">
            <h4><i data-lucide="network"></i> Network Interconnections</h4>
            <div id="d-network"></div>
        </div>

        <div class="section">
            <h4><i data-lucide="layers"></i> Application Stack</h4>
            <div id="d-software-container"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const data = {
            macLaptop: {
                name: "MAC-LAPTOP",
                role: "Management Console & Control Plane",
                storage: [{ n: "256GB Internal SSD", t: "Primary Storage", sub: "OS / System" }],
                net: ["5GHz Wi-Fi LAN", "Tailscale VPN"],
                sw: {
                    Production: ["Antigravity", "Claude Code", "VS Code", "Obsidian"],
                    Infrastructure: ["Tailscale"],
                    Management: ["Jump Desktop", "Microsoft Remote Desktop", "Apple Screen Sharing"]
                }
            },
            macMini: {
                name: "MAC-MINI",
                role: "Infrastructure Hub / Subnet Router / Media Server",
                storage: [
                    { n: "256GB Internal SSD", t: "Primary Storage", sub: "OS / System" },
                    { n: "1TB M.2 NVMe (TB4)", t: "Primary Storage", sub: "Agent Sandbox" },
                    { n: "2TB M.2 NVMe (TB4)", t: "Primary Storage", sub: "Sandbox Staging / Mac Laptop Remote Work" },
                    { n: "32TB 8-Bay Array (USB 3)", t: "Primary / Secondary / Tertiary Storage", sub: "Hybrid Pool" }
                ],
                net: ["Tailscale Subnet Router", "Thunderbolt 4 Bridge (SMB)", "5GHz Wi-Fi LAN"],
                sw: {
                    Production: ["Antigravity", "Claude Code", "VS Code", "Xcode", "Dorico", "Notion", "Reaper", "Nuendo", "Bidule", "Blender"],
                    Infrastructure: ["Custom App: Fortress Security Control Center", "Tailscale"]
                }
            },
            winWorkstation: {
                name: "WIN-WORKSTATION",
                role: "High-Compute Production Core",
                storage: [
                    { n: "8TB M.2 NVMe Internal", t: "Primary Storage", sub: "Active Projects" },
                    { n: "8TB SATA III SSD Internal", t: "Secondary Storage", sub: "Backups" },
                    { n: "8TB 4-Bay Array (USB 3)", t: "Tertiary Storage", sub: "Cold Storage" }
                ],
                net: ["Thunderbolt 4 Bridge (SMB)", "1Gb Gigabit Ethernet", "5GHz Wi-Fi LAN"],
                sw: {
                    Production: ["Ollama", "n8n", "Langflow", "Reaper", "Nuendo", "Bidule", "VSL", "SWAM", "Sample Modeling", "SPARTA", "IEM", "MIR PRO 3D", "Wwise", "Unity", "Unreal Engine", "Blender", "OBS Studio", "DaVinci Resolve"],
                    Infrastructure: ["Docker", "WSL 2", "Tailscale", "rtpMIDI"]
                }
            },
            winLaptop: {
                name: "WIN-LAPTOP",
                role: "Mobile Production Node",
                storage: [{ n: "2TB SATA III SSD", t: "Primary Storage", sub: "Field Production" }],
                net: ["1Gb Gigabit Ethernet", "5GHz Wi-Fi LAN"],
                sw: {
                    Production: ["Dorico", "Notion", "Reaper", "Nuendo"],
                    Infrastructure: ["Tailscale", "rtpMIDI"]
                }
            }
        };

        function inspect(key) {
            const item = data[key];
            const panel = document.getElementById('panel');
            const mapArea = document.getElementById('map-area');

            panel.classList.add('active');
            mapArea.classList.add('shifted');

            document.getElementById('d-name').innerText = item.name;
            document.getElementById('d-role').innerText = item.role;

            document.getElementById('d-storage').innerHTML = item.storage.map(s => `
                <div class="storage-item">
                    <div class="storage-item-title">${s.n}</div>
                    <div class="storage-tier">${s.t}</div>
                    <div class="storage-sub">${s.sub}</div>
                </div>
            `).join('');

            document.getElementById('d-network').innerHTML = item.net.map(n => `
                <div class="list-item"><i data-lucide="check-circle" style="width:16px; height:16px; color:#4ade80"></i> ${n}</div>
            `).join('');

            let swHtml = '';
            for (const [category, apps] of Object.entries(item.sw)) {
                swHtml += `<div class="app-category-label">${category}</div>`;
                swHtml += `<div class="software-grid">`;
                swHtml += apps.map(app => `<div class="sw-tag">${app}</div>`).join('');
                swHtml += `</div>`;
            }
            document.getElementById('d-software-container').innerHTML = swHtml;

            lucide.createIcons();
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('active');
            document.getElementById('map-area').classList.remove('shifted');
        }
    </script>
</body>

</html>
