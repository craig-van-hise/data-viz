<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composer Profile</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@200;300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f13;
            --surface-dark: #1a1a20;
            --surface-light: #2a2a35;
            --primary: #8ab4f8;
            --text-main: #e8eaed;
            --text-muted: #9aa0a6;
            --marker-color: #8ab4f8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: linear-gradient(180deg, rgba(15, 15, 19, 0.95) 0%, rgba(15, 15, 19, 0.8) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            font-size: 3rem;
            margin: 0;
            letter-spacing: -0.02em;
            letter-spacing: -0.02em;
        }

        .lifespan {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-top: 5px;
            letter-spacing: 0.05em;
            opacity: 0.9;
        }

        .stats {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #timeline-container {
            width: 90%;
            max-width: 1400px;
            margin-top: 60px;
            position: relative;
            padding-top: 140px; 
            padding-bottom: 20px; 
            /* Space for tooltips and sky labels */
        }

        .year-axis {
            position: relative;
            height: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 30px;
        }

        .year-mark {
            position: absolute;
            bottom: 5px;
            font-size: 0.75rem;
            color: var(--text-muted);
            transform: translateX(-50%);
        }

        .year-tick {
            position: absolute;
            bottom: 0;
            height: 5px;
            width: 1px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .timeline-track {
            position: relative;
            height: 60px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            margin-top: 20px;
        }

        /* Marker Styles */
        .film-marker {
            position: absolute;
            top: 50%;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--marker-color);
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 0 10px rgba(138, 180, 248, 0.3);
            z-index: 10;
        }

        .film-marker:hover {
            transform: translate(-50%, -50%) scale(1.5);
            background-color: #fff;
            box-shadow: 0 0 20px rgba(138, 180, 248, 0.6);
            z-index: 100;
        }

        /* Tooltip */
        .film-tooltip {
            position: absolute;
            /* Above marker */
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: clamp(200px, 20vw, 400px);
            /* Adaptive Width */
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 12px 20px 12px;
            /* Extra bottom padding to prevent clipping */
            display: none;
            /* Hidden by default */
            flex-direction: column;
            /* Kept for Portal using flex */
            pointer-events: none;
            transition: all 0.2s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            z-index: 1000;
            text-align: center;
            text-align: center;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }



        .film-marker:hover .film-tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .tooltip-img {
            width: 100%;
            height: auto;
            max-height: 32vh;
            /* Reduced further to ensure text visibility */
            border-radius: 8px;
            margin-bottom: 8px;
            object-fit: contain;
            /* Ensure image fits without cropping if constrained */
            background: #000;
            align-self: center;
            /* Center if width < 100% due to height constraint */
            flex-shrink: 1;
            /* ALLOW image to shrink if text needs space */
            min-height: 60px;
            /* Prevent total collapse */
        }

        .tooltip-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #fff;
            margin-bottom: 2px;
            line-height: 1.2;
            flex-shrink: 0;
            /* Critical: Prevent text clipping */
        }

        .tooltip-year {
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .tooltip-meta {
            font-size: 0.7rem;
            color: var(--primary);
            margin-top: 4px;
            display: block;
            font-style: italic;
            flex-shrink: 0;
            padding-bottom: 10px;
            /* Extra spacer for bottom edge */
        }

        /* Vertical Staggering will set different 'top' values inline */

        /* Feature v1.60: Important Film Highlights */
        .marker-imp-container {
            /* Container now acts as a point-origin anchor at the dot center */
            position: absolute;
            bottom: 0px;
            left: 50%;
            display: block;
            pointer-events: none;
            /* Let clicks pass to marker */
        }

        .marker-pole {
            width: 1px;
            height: 60px;
            /* Much taller pole to reach up */
            background: rgba(255, 255, 255, 0.4);
            margin-bottom: 2px;
        }

        .marker-label {
            position: absolute;
            font-size: 0.85rem;
            /* Larger font */
            font-weight: 700;
            /* Bold */
            color: #fff;
            background: rgb(30, 30, 30); /* Must be fully opaque to hide lines behind it */
            border: 1px solid rgba(255, 255, 255, 0.5);
            /* Visible border */
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
            letter-spacing: 0.03em;
            text-shadow: none;
            /* Removed shadow in favor of card opacity */
            z-index: 10; /* Forces the label above the SVG line locally */
        }

        font-weight: 500;
        }
    </style>
</head>

<body>

    <header>
        <h1 id="composer-name">Composer Name</h1>
        <div id="composer-lifespan" class="lifespan"></div>
        <div class="stats" id="composer-stats">Loading...</div>
    </header>

    <div id="timeline-container">
        <div class="timeline-track" id="track"></div>
        <div class="year-axis" id="year-axis"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const composerName = params.get('name') || "Miklós_Rózsa"; // Default for testing

        // Metadata for filtering (Death Years)
        const COMPOSER_META = {
            "Miklós_Rózsa": { death: 1995 },
            "Bernard_Herrmann": { death: 1975 },
            "Alfred_Newman": { death: 1970 },
            "Max_Steiner": { death: 1971 },
            "Dimitri_Tiomkin": { death: 1979 },
            "Franz_Waxman": { death: 1967 },
            "Erich_Wolfgang_Korngold": { death: 1957 },
            "Jerry_Goldsmith": { death: 2004 },
            "James_Horner": { death: 2015 },
            "Michael_Kamen": { death: 2003 },
            "Elmer_Bernstein": { death: 2004 },
            "Maurice_Jarre": { death: 2009 },
            "John_Barry": { death: 2011 },
            "Henry_Mancini": { death: 1994 },
            "Nino_Rota": { death: 1979 },
            "Ennio_Morricone": { death: 2020 },
            "Vangelis": { death: 2022 },
            "Ryuichi_Sakamoto": { death: 2023 }
        };

        const jsonPath = `data/filmographies/${composerName}.json`;
        const thumbBase = `thumbnails/${composerName.replace(/_/g, " ")}/`;

        document.getElementById('composer-name').textContent = composerName.replace(/_/g, " ");

        // Load Data (Parallel & Robust)
        // We catch errors on individual optional fetches so the main timeline never breaks.
        const pFilms = fetch(jsonPath).then(r => r.json());

        const pLifespan = fetch('data/composer_lifespans.json')
            .then(r => r.json())
            .catch(e => { console.warn("Lifespan fetch failed", e); return []; });

        const pImportant = fetch('data/Most%20important%20films.json')
            .then(r => r.json())
            .catch(e => { console.warn("Important films fetch failed", e); return []; });

        Promise.all([pFilms, pLifespan, pImportant]).then(([filmData, lifespanData, importantData]) => {
            // 1. Setup Lifespan (Safe access)
            if (lifespanData && lifespanData.length > 0) {
                const displayName = composerName.replace(/_/g, " ");
                const lifeEntry = lifespanData.find(c => c.composer === displayName);
                if (lifeEntry) {
                    const birthYear = lifeEntry.birth.split('/')[2];
                    let deathYear = lifeEntry.death === '-' ? 'Present' : lifeEntry.death.split('/')[2];
                    document.getElementById('composer-lifespan').textContent = `${birthYear} – ${deathYear}`;
                }
            }

            // 2. Setup Important Films List (Safe access)
            const displayName = composerName.replace(/_/g, " ");
            let importantTitles = [];
            if (importantData && importantData.length > 0) {
                const importantEntry = importantData.find(c => c.composer === displayName);
                importantTitles = importantEntry ? importantEntry.films.map(f => f.title) : [];
            }

            // 3. Init Timeline
            initTimeline(filmData, importantTitles);

        }).catch(e => {
            // Debugging: Show exact error on screen
            document.getElementById('composer-stats').innerHTML = `<span style="color:red">Error: ${e.message}</span>`;
            console.error(e);
        });

        // Removed the old separate fetch blocks to consolidate into Promise.all

        function initTimeline(data, highlightList = []) {
            console.log("Timeline init v1.66. Highlights:", highlightList);
            
            const films = Array.isArray(data) ? data : data.filmography;
            
            const concertKeywords = ["Op.", "Concerto", "Sonata", "Symphony", "Quartet", "Trio", "Quintet", "Variations", "Motet", "Cantata", "Mass", "Psalm", "Overture"];
            const junkKeywords = ["Articles lacking sources", "Category:", "Template:"];
            const meta = COMPOSER_META[composerName] || { death: 9999 };

            // Helper function to force every year into a mathematical integer
            const getYear = (f) => {
                if (f.year) return parseInt(f.year);
                if (f.release_date) return parseInt(f.release_date.substring(0, 4));
                return null;
            };

            const validFilms = films.filter(f => {
                const releaseYear = getYear(f);
                
                // Exclude invalid or missing dates (9999)
                if (!releaseYear || releaseYear === 9999) return false;

                // Exclude concert works and junk
                if (concertKeywords.some(kw => f.title.includes(kw))) return false;
                if (junkKeywords.some(kw => f.title.includes(kw))) return false;

                // Exclude post-death works
                if (releaseYear > meta.death) return false;

                return true;
            });

            // Sort purely by integer math
            validFilms.sort((a, b) => getYear(a) - getYear(b));

            // Stats & Axis boundaries (Math is now safe from string concatenation)
            const startYear = getYear(validFilms[0]);
            const endYear = getYear(validFilms[validFilms.length - 1]) + 1; 
            
            document.getElementById('composer-stats').textContent = `${validFilms.length} Films | Active ${startYear} - ${endYear - 1}`;

            drawAxis(startYear, endYear);
            drawMarkers(validFilms, startYear, endYear, highlightList);
        }

        function drawAxis(start, end) {
            const container = document.getElementById('year-axis');
            const range = end - start;

            for (let y = start; y <= end; y++) {
                if (y % 5 === 0) { // Tick every 5 years
                    const pct = ((y - start) / range) * 100;

                    const mark = document.createElement('div');
                    mark.className = 'year-mark';
                    mark.textContent = y;
                    mark.style.left = `${pct}%`;
                    container.appendChild(mark);

                    const tick = document.createElement('div');
                    tick.className = 'year-tick';
                    tick.style.left = `${pct}%`;
                    container.appendChild(tick);
                }
            }
        }

        // Bulletproof percentage calculator handling both old strings and new numbers
        function getPercent(dateVal, start, end) {
            const dateStr = String(dateVal);
            const y = parseInt(dateStr.substring(0, 4));
            let decimalYear = y;

            if (dateStr.length > 4 && dateStr.includes('-')) {
                let m = parseInt(dateStr.substring(5, 7)) - 1 || 0;
                let d = parseInt(dateStr.substring(8, 10)) - 1 || 0;
                decimalYear = y + (((m * 30) + d) / 365);
            }

            return ((decimalYear - start) / (end - start)) * 100;
        }

        function cleanTitle(t) {
            return t.replace(/['":\.\?!]/g, "").trim();
        }

        function drawMarkers(films, start, end, highlightList = []) {
            const track = document.getElementById('track');
            const markers = []; 

            films.forEach(film => {
                // Use new year or old release_date
                const dateVal = film.year || film.release_date; 
                const pct = getPercent(dateVal, start, end);
                const safeTitle = cleanTitle(film.title);
                const marker = document.createElement('div');
                marker.className = 'film-marker';
                marker.style.left = `${pct}%`;

                // Image Fallback Logic
                const localThumb = `${thumbBase}${safeTitle}.jpg`;
                const tmdbThumb = film.poster ? film.poster : 'https://placehold.co/200x300?text=No+Image';

                let html = `
                    <div class="film-tooltip">
                        <img src="${localThumb}" class="tooltip-img" onerror="this.onerror=null; this.src='${tmdbThumb}';">
                        <div class="tooltip-title">${film.title}</div>
                        <div class="tooltip-year">${dateVal}</div>
                `;
                if (film.youtube_link) {
                    html += `<a href="${film.youtube_link}" target="_blank" class="tooltip-meta">▶ Play Theme</a>`;
                    marker.onclick = () => window.open(film.youtube_link, '_blank');
                }
                html += `</div>`;
                marker.innerHTML = html;

                // Portal Strategy: Use a single global tooltip attached to body
                // This ensures z-index and overflow are never issues.

                marker.addEventListener('mouseenter', function () {
                    // 1. Get or Create Global Tooltip
                    let portalTooltip = document.getElementById('global-film-tooltip');
                    if (!portalTooltip) {
                        portalTooltip = document.createElement('div');
                        portalTooltip.id = 'global-film-tooltip';
                        portalTooltip.className = 'film-tooltip';
                        // Force fixed styling
                        portalTooltip.style.position = 'fixed';
                        portalTooltip.style.zIndex = '999999';
                        portalTooltip.style.boxSizing = 'border-box';
                        portalTooltip.style.pointerEvents = 'none'; // Initially none
                        portalTooltip.style.transition = 'opacity 0.2s, transform 0.2s';
                        portalTooltip.style.display = 'flex'; // Override CSS hide
                        document.body.appendChild(portalTooltip);
                    }

                    // 2. Populate Content (Clone from internal template)
                    const localTooltip = this.querySelector('.film-tooltip');
                    if (localTooltip) {
                        portalTooltip.innerHTML = localTooltip.innerHTML;
                    }

                    // 3. Show and Position
                    portalTooltip.style.display = 'flex';
                    portalTooltip.style.opacity = '1';
                    portalTooltip.style.pointerEvents = 'auto';

                    const recalcPortal = () => {
                        // Check if marker is still in DOM/visible
                        if (!document.body.contains(marker)) return;

                        const markerRect = marker.getBoundingClientRect();
                        const viewportWidth = window.innerWidth;
                        const viewportHeight = window.innerHeight;

                        // Config
                        const offset = 15;
                        const safetyMargin = 25; // Increased to prevent edge touching

                        // Space relative to viewport
                        const spaceAbove = markerRect.top;
                        const spaceBelow = viewportHeight - markerRect.bottom;

                        // Effective space
                        const effectiveAbove = spaceAbove - offset - safetyMargin;
                        const effectiveBelow = spaceBelow - offset - safetyMargin;

                        const goUp = (effectiveAbove >= effectiveBelow);

                        // Reset
                        portalTooltip.style.top = 'auto';
                        portalTooltip.style.bottom = 'auto';
                        portalTooltip.style.left = 'auto';
                        portalTooltip.style.right = 'auto';
                        portalTooltip.style.transform = 'translate(-50%, 0)';
                        portalTooltip.style.maxHeight = 'none';
                        portalTooltip.classList.remove('tooltip-down', 'tooltip-up');

                        // Horizontal Center
                        const centerX = markerRect.left + (markerRect.width / 2);
                        portalTooltip.style.left = centerX + 'px';

                        if (goUp) {
                            // Position ABOVE (Fixed Bottom relative to viewport)
                            // bottom = viewportHeight - (top_of_marker - offset)
                            portalTooltip.style.bottom = (viewportHeight - markerRect.top + offset) + 'px';
                            portalTooltip.style.maxHeight = Math.max(80, effectiveAbove) + 'px';
                            portalTooltip.classList.add('tooltip-up');
                        } else {
                            // Position BELOW (Fixed Top relative to viewport)
                            // top = bottom_of_marker + offset
                            portalTooltip.style.top = (markerRect.bottom + offset) + 'px';
                            portalTooltip.style.maxHeight = Math.max(80, effectiveBelow) + 'px';
                            portalTooltip.classList.add('tooltip-down');
                        }

                        // Horizontal Clamping
                        // We use a RAF to read the width after render, or estimate?
                        // Better to use RAF to read width of portalTooltip
                        requestAnimationFrame(() => {
                            const rect = portalTooltip.getBoundingClientRect();
                            const halfWidth = rect.width / 2;

                            // If Left Edge < Safety
                            if ((centerX - halfWidth) < safetyMargin) {
                                const diff = safetyMargin - (centerX - halfWidth);
                                portalTooltip.style.transform = `translate(calc(-50% + ${diff}px), 0)`;
                            }
                            // If Right Edge > Safety
                            else if ((centerX + halfWidth) > (viewportWidth - safetyMargin)) {
                                const diff = (centerX + halfWidth) - (viewportWidth - safetyMargin);
                                portalTooltip.style.transform = `translate(calc(-50% - ${diff}px), 0)`;
                            }
                        });
                    };

                    // 5. Event-Based Updates (No Loop = No Flicker)
                    // We attach listeners only while the tooltip is active.
                    const onUpdate = () => {
                        if (portalTooltip.style.opacity === '1') {
                            recalcPortal();
                        }
                    };

                    window.addEventListener('resize', onUpdate, { passive: true });
                    window.addEventListener('scroll', onUpdate, { passive: true });

                    // Initial Position
                    recalcPortal();

                    // 6. Cleanup
                    const hide = () => {
                        portalTooltip.style.opacity = '0';
                        portalTooltip.style.pointerEvents = 'none';
                        // Remove listeners to save resources
                        window.removeEventListener('resize', onUpdate);
                        window.removeEventListener('scroll', onUpdate);
                    };

                    marker.addEventListener('mouseleave', hide, { once: true });
                    // If marker is off screen, hide tooltip? 
                    // No, let's keep it simple. User asked for resizing.
                    // We remove the explicit scroll listener to allow them to scroll comfortably.
                    // Only hide on mouseleave.
                });

                // Create the visual dot
                const dot = document.createElement('div');
                dot.className = 'marker-dot';

                marker.appendChild(dot);

                // Feature v1.60: Highlight Important Films
                if (highlightList.includes(film.title)) {
                    const highlight = document.createElement('div');
                    highlight.className = 'marker-imp-container';
                    highlight.innerHTML = `
                        <svg class="marker-pole-svg" style="position: absolute; width: 1px; height: 1px; left: 0; bottom: 0; overflow: visible; z-index: -1;"></svg>
                        <div class="marker-label">${film.title}</div>
                    `;
                    marker.appendChild(highlight);
                    // Add z-index boost to important markers
                    marker.style.zIndex = "50";
                }

                // Tooltip Logic (Portal)ggering?
                // For this dedicated view, we can just alternate top/bottom heavily or use random
                // Let's use simple Collision logic like before
                markers.push({ el: marker, pct: pct, row: 0 });
            });

            // Apply Staggering (Dynamic Vertical Stacking)
            markers.sort((a, b) => a.pct - b.pct);

            // 1. Group markers into columns if they are close together horizontally
            const columns = [];
            let currentColumn = [];

            markers.forEach(m => {
                if (currentColumn.length === 0) {
                    currentColumn.push(m);
                } else {
                    const head = currentColumn[0];
                    // If within 1.5% of the column's start, add to the vertical stack
                    if (m.pct - head.pct < 1.5) { 
                        currentColumn.push(m);
                    } else {
                        columns.push(currentColumn);
                        currentColumn = [m];
                    }
                }
            });
            if (currentColumn.length > 0) columns.push(currentColumn);

            // 1.5 Calculate dynamic bottom margin to prevent axis collision
            if (columns.length > 0) {
                const maxStack = Math.max(...columns.map(col => col.length));
                const spacing = 16; 
                const maxDownwardReach = (maxStack / 2) * spacing;
                const safeMargin = Math.max(30, maxDownwardReach + 15);
                
                // Push the axis down by adding margin-bottom to the track
                track.style.marginBottom = `${safeMargin}px`;
            }

            // 2. Distribute each column vertically from the center
            columns.forEach(col => {
                const count = col.length;
                const spacing = 16; // Vertical pixels between dots
                
                // Calculate starting offset to keep the stack centered on the track
                const startOffset = -((count - 1) * spacing) / 2;
                
                // Use the column's average percentage for perfectly straight vertical lines
                const avgPct = col.reduce((sum, m) => sum + m.pct, 0) / count;

                col.forEach((m, j) => {
                    m.el.style.left = `${avgPct}%`; 
                    const offset = startOffset + (j * spacing);
                    
                    // Center the stack on the 50% line of the track
                    m.el.style.top = `calc(50% + ${offset}px)`;
                    track.appendChild(m.el);
                });
            });

            // v1.70: Resolve Collisions for Highlights
            // Use setTimeout to allow DOM reflow for correct width calculation
            setTimeout(resolveSmartCollisions, 50);
        }

        /* v1.70 Collision Resolution Engine */
        function resolveSmartCollisions() {
            const containers = Array.from(document.querySelectorAll('.marker-imp-container'));
            if (containers.length === 0) return;

            const trackRect = document.getElementById('track').getBoundingClientRect();
            const allMarkers = Array.from(document.querySelectorAll('.film-marker'));

            // Establish Sky Baseline
            let minMarkerY = trackRect.top;
            allMarkers.forEach(m => {
                const rect = m.getBoundingClientRect();
                if (rect.top < minMarkerY) minMarkerY = rect.top;
            });
            const skyBaseline = minMarkerY - 25;

            // 1. PRE-CALCULATE absolute X positions to decouple from CSS transform quirks
            const boxesData = containers.map(box => {
                const marker = box.parentElement;
                const label = box.querySelector('.marker-label');
                const svg = box.querySelector('.marker-pole-svg');

                // Temporarily wipe CSS transforms to measure raw element width safely
                label.style.transform = 'none';
                label.style.left = '0px';

                const markerRect = marker.getBoundingClientRect();
                const markerCenterX = markerRect.left + (markerRect.width / 2);
                const labelWidth = label.offsetWidth;

                // Center label mathematically over the dot
                let absoluteLeft = markerCenterX - (labelWidth / 2);
                let absoluteRight = absoluteLeft + labelWidth;

                // Apply Viewport Edge Bounding
                const safetyPadding = 20;
                const viewportWidth = window.innerWidth;

                if (absoluteLeft < safetyPadding) {
                    absoluteLeft = safetyPadding;
                    absoluteRight = absoluteLeft + labelWidth;
                } else if (absoluteRight > viewportWidth - safetyPadding) {
                    absoluteRight = viewportWidth - safetyPadding;
                    absoluteLeft = absoluteRight - labelWidth;
                }

                // Calculate the exact local pixel offset required
                const localLeft = absoluteLeft - markerCenterX;

                return { box, marker, label, svg, absoluteLeft, absoluteRight, localLeft, markerRect };
            });

            // 2. Sort by absolute X for a flawless collision sweep
            boxesData.sort((a, b) => a.absoluteLeft - b.absoluteLeft);

            const lanes = [];

            boxesData.forEach(data => {
                const { box, marker, label, svg, absoluteLeft, absoluteRight, localLeft, markerRect } = data;
                const gap = 15;

                // 3. Find Lane using true absolute bounds
                let laneIndex = 0;
                let found = false;
                while (!found) {
                    if (!lanes[laneIndex]) lanes[laneIndex] = [];
                    const hasCollision = lanes[laneIndex].some(zone => {
                        return !(absoluteRight + gap < zone.left || absoluteLeft - gap > zone.right);
                    });
                    if (!hasCollision) found = true;
                    else laneIndex++;
                }
                lanes[laneIndex].push({ left: absoluteLeft, right: absoluteRight });

                // 4. Base Anchoring
                box.style.top = '50%';
                box.style.left = '50%';
                box.style.bottom = 'auto';
                box.style.transform = 'none'; 

                // 5. CRITICAL Z-INDEX FIX: Force stacking context with !important
                marker.style.setProperty('z-index', 1000 - (laneIndex * 10), 'important');
                box.style.setProperty('z-index', 'auto', 'important');
                label.style.setProperty('z-index', '10', 'important');

                // 6. Height Calculation
                const distanceToSky = markerRect.top - skyBaseline;
                const step = 42;
                const safeDistance = Math.max(20, distanceToSky);
                const labelHeightOffset = safeDistance + (laneIndex * step) + 6;

                // 7. Apply Deterministic CSS to Label
                label.style.bottom = `${labelHeightOffset}px`;
                label.style.left = `${localLeft}px`;
                label.style.transform = 'none'; // Position is now driven entirely by exact absolute left

                // 8. SVG Path Generation
                const startY = -labelHeightOffset + 2;
                const dropX = -14;
                const dotCenterY = 0;
                const dotEdgeX = -6;

                svg.innerHTML = `
                    <path d="M ${dropX} ${startY} L ${dropX} ${dotCenterY} L ${dotEdgeX} ${dotCenterY}"
                          fill="none"
                          stroke="rgba(255, 255, 255, 0.4)"
                          stroke-width="1.5" />
                `;
            });
        }

        // Re-run on resize
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(resolveSmartCollisions, 100);
        });
    </script>
</body>

</html>
